<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Soltastic — Coming Soon</title>
  <meta
    name="description"
    content="Soltastic — Solana over Meshtastic. Coming soon."
  />

  <link rel="stylesheet" href="style.css" />

  <style>
    .hero {
      position: relative;
    }

    .social-links {
      position: absolute;
      top: clamp(16px, 3vw, 32px);
      right: clamp(16px, 3vw, 32px);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .social-links a {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #39ff88;
      border: 1px solid rgba(57, 255, 136, 0.35);
      border-radius: 999px;
      background: rgba(3, 12, 10, 0.38);
      backdrop-filter: blur(8px);
      transition: transform 0.18s ease, color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .social-links a:hover,
    .social-links a:focus-visible {
      color: #7dffb2;
      border-color: rgba(125, 255, 178, 0.8);
      background: rgba(57, 255, 136, 0.12);
      transform: translateY(-2px);
      outline: none;
    }

    .social-links svg {
      width: 21px;
      height: 21px;
      display: block;
    }
  </style>
</head>
