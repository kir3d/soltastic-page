<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 720" width="100%" height="100%">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945FF"/>
      <stop offset="100%" style="stop-color:#14F195"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    @keyframes circle1 { 0% { opacity:0; } 5%,100% { opacity:1; } }
    @keyframes circle2 { 0%,10% { opacity:0; } 15%,100% { opacity:1; } }
    @keyframes circle3 { 0%,20% { opacity:0; } 25%,100% { opacity:1; } }
    @keyframes circle4 { 0%,30% { opacity:0; } 35%,100% { opacity:1; } }
    @keyframes circle5 { 0%,40% { opacity:0; } 45%,100% { opacity:1; } }
    @keyframes circle6 { 0%,50% { opacity:0; } 55%,100% { opacity:1; } }
    @keyframes circle7 { 0%,60% { opacity:0; } 65%,100% { opacity:1; } }
    @keyframes circle8 { 0%,70% { opacity:0; } 75%,100% { opacity:1; } }
    
    @keyframes slideRight1 { 0% { opacity:0; transform:translateX(-30px); } 5%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideRight2 { 0%,10% { opacity:0; transform:translateX(-30px); } 15%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideLeft3 { 0%,20% { opacity:0; transform:translateX(30px); } 25%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideLeft4 { 0%,30% { opacity:0; transform:translateX(30px); } 35%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideRight5 { 0%,40% { opacity:0; transform:translateX(-30px); } 45%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideRight6 { 0%,50% { opacity:0; transform:translateX(-30px); } 55%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideLeft7 { 0%,60% { opacity:0; transform:translateX(30px); } 65%,100% { opacity:1; transform:translateX(0); } }
    @keyframes slideLeft8 { 0%,70% { opacity:0; transform:translateX(30px); } 75%,100% { opacity:1; transform:translateX(0); } }

    @keyframes dashRight { from { stroke-dashoffset: 15; } to { stroke-dashoffset: 0; } }
    @keyframes dashLeft { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -15; } }

    .circle1 { opacity:0; animation: circle1 2s ease-out forwards; }
    .circle2 { opacity:0; animation: circle2 2s ease-out forwards; }
    .circle3 { opacity:0; animation: circle3 2s ease-out forwards; }
    .circle4 { opacity:0; animation: circle4 2s ease-out forwards; }
    .circle5 { opacity:0; animation: circle5 2s ease-out forwards; }
    .circle6 { opacity:0; animation: circle6 2s ease-out forwards; }
    .circle7 { opacity:0; animation: circle7 2s ease-out forwards; }
    .circle8 { opacity:0; animation: circle8 2s ease-out forwards; }
    
    .content1 { opacity:0; animation: slideRight1 2s ease-out forwards; }
    .content2 { opacity:0; animation: slideRight2 2s ease-out forwards; }
    .content3 { opacity:0; animation: slideLeft3 2s ease-out forwards; }
    .content4 { opacity:0; animation: slideLeft4 2s ease-out forwards; }
    .content5 { opacity:0; animation: slideRight5 2s ease-out forwards; }
    .content6 { opacity:0; animation: slideRight6 2s ease-out forwards; }
    .content7 { opacity:0; animation: slideLeft7 2s ease-out forwards; }
    .content8 { opacity:0; animation: slideLeft8 2s ease-out forwards; }
    
    .desc-box-purple { stroke: #667eea; stroke-width: 1; }
    .desc-box-pink { stroke: #f5576c; stroke-width: 1; }
    .dash-right { stroke-dasharray: 10,5; animation: dashRight 0.4s linear infinite; }
    .dash-left { stroke-dasharray: 10,5; animation: dashLeft 0.4s linear infinite; }
  </style>

  <!-- Background -->
  <rect x="0" y="0" width="950" height="720" fill="url(#bgGrad)"/>

  <!-- Connection labels at top -->
  <rect x="155" y="20" width="300" height="25" rx="5" fill="none" stroke="#67EA94" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="305" y="37" text-anchor="middle" fill="#67EA94" font-family="Arial, sans-serif" font-size="10">⚡ Meshtastic Radio Link</text>
  <rect x="495" y="20" width="300" height="25" rx="5" fill="none" stroke="#9945FF" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="645" y="37" text-anchor="middle" fill="#9945FF" font-family="Arial, sans-serif" font-size="10">🌐 Internet / RPC</text>

  <!-- Entities -->
  <rect x="75" y="60" width="120" height="50" rx="10" fill="url(#clientGrad)" filter="url(#shadow)"/>
  <text x="135" y="90" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">CLIENT</text>
  <rect x="415" y="60" width="120" height="50" rx="10" fill="url(#serverGrad)" filter="url(#shadow)"/>
  <text x="475" y="90" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">SERVER</text>
  <rect x="755" y="60" width="120" height="50" rx="10" fill="url(#nodeGrad)" filter="url(#shadow)"/>
  <text x="815" y="82" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Solana</text>
  <text x="815" y="100" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">RPC Node</text>

  <!-- Vertical lines -->
  <line x1="135" y1="110" x2="135" y2="690" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="475" y1="110" x2="475" y2="690" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <line x1="815" y1="110" x2="815" y2="690" stroke="#9945FF" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>

  <!-- Step 1: Client → Server: init (pubkey) -->
  <g class="circle1">
    <circle cx="55" cy="150" r="18" fill="#67EA94"/>
    <text x="55" y="155" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1</text>
  </g>
  <g class="content1">
    <line x1="135" y1="150" x2="465" y2="150" stroke="#67EA94" stroke-width="2" class="dash-right"/>
    <polygon points="465,150 455,145 455,155" fill="#67EA94"/>
    <rect x="225" y="130" width="140" height="30" rx="5" fill="#2d2d44" class="desc-box-purple"/>
    <text x="295" y="150" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">init (pubkey)</text>
    <text x="295" y="175" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Client Initialization</text>
  </g>

  <!-- Step 2: Server → RPC: get balances / create Durable Nonce -->
  <g class="circle2">
    <circle cx="55" cy="220" r="18" fill="#9945FF"/>
    <text x="55" y="225" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2</text>
  </g>
  <g class="content2">
    <line x1="475" y1="220" x2="805" y2="220" stroke="#9945FF" stroke-width="2" class="dash-right"/>
    <polygon points="805,220 795,215 795,225" fill="#9945FF"/>
    <rect x="545" y="200" width="200" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="645" y="220" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">get balances / create Durable Nonce</text>
    <text x="645" y="245" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Request to Solana</text>
  </g>

  <!-- Step 3: RPC → Server: balances / Durable Nonce -->
  <g class="circle3">
    <circle cx="55" cy="290" r="18" fill="#9945FF"/>
    <text x="55" y="295" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3</text>
  </g>
  <g class="content3">
    <line x1="815" y1="290" x2="485" y2="290" stroke="#9945FF" stroke-width="2" class="dash-left"/>
    <polygon points="485,290 495,285 495,295" fill="#9945FF"/>
    <rect x="555" y="270" width="180" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="645" y="290" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">balances / Durable Nonce</text>
    <text x="645" y="315" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Solana Response</text>
  </g>

  <!-- Step 4: Server → Client: balances / Durable Nonce -->
  <g class="circle4">
    <circle cx="55" cy="360" r="18" fill="#67EA94"/>
    <text x="55" y="365" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4</text>
  </g>
  <g class="content4">
    <line x1="475" y1="360" x2="145" y2="360" stroke="#67EA94" stroke-width="2" class="dash-left"/>
    <polygon points="145,360 155,355 155,365" fill="#67EA94"/>
    <rect x="205" y="340" width="180" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="295" y="360" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">balances / Durable Nonce</text>
    <text x="295" y="385" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Server Response</text>
  </g>

  <!-- Step 5: Client → Server: metadata + signature -->
  <g class="circle5">
    <circle cx="55" cy="430" r="18" fill="#67EA94"/>
    <text x="55" y="435" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5</text>
  </g>
  <g class="content5">
    <line x1="135" y1="430" x2="465" y2="430" stroke="#67EA94" stroke-width="2" class="dash-right"/>
    <polygon points="465,430 455,425 455,435" fill="#67EA94"/>
    <rect x="205" y="410" width="180" height="30" rx="5" fill="#2d2d44" class="desc-box-purple"/>
    <text x="295" y="430" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">metadata + signature</text>
    <text x="295" y="455" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Client Metadata Submission</text>
  </g>

  <!-- Step 6: Server → RPC: recreated transaction -->
  <g class="circle6">
    <circle cx="55" cy="500" r="18" fill="#9945FF"/>
    <text x="55" y="505" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">6</text>
  </g>
  <g class="content6">
    <line x1="475" y1="500" x2="805" y2="500" stroke="#9945FF" stroke-width="2" class="dash-right"/>
    <polygon points="805,500 795,495 795,505" fill="#9945FF"/>
    <rect x="555" y="480" width="180" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="645" y="500" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">recreated transaction</text>
    <text x="645" y="525" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Transaction Submission</text>
  </g>

  <!-- Step 7: RPC → Server: tx hash -->
  <g class="circle7">
    <circle cx="55" cy="570" r="18" fill="#9945FF"/>
    <text x="55" y="575" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">7</text>
  </g>
  <g class="content7">
    <line x1="815" y1="570" x2="485" y2="570" stroke="#9945FF" stroke-width="2" class="dash-left"/>
    <polygon points="485,570 495,565 495,575" fill="#9945FF"/>
    <rect x="575" y="550" width="140" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="645" y="570" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">tx hash</text>
    <text x="645" y="595" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Transaction Confirmation</text>
  </g>

  <!-- Step 8: Server → Client: tx hash -->
  <g class="circle8">
    <circle cx="55" cy="640" r="18" fill="#67EA94"/>
    <text x="55" y="645" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="12" font-weight="bold">8</text>
  </g>
  <g class="content8">
    <line x1="475" y1="640" x2="145" y2="640" stroke="#67EA94" stroke-width="2" class="dash-left"/>
    <polygon points="145,640 155,635 155,645" fill="#67EA94"/>
    <rect x="225" y="620" width="140" height="30" rx="5" fill="#2d2d44" class="desc-box-pink"/>
    <text x="295" y="640" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11">tx hash</text>
    <text x="295" y="665" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="10">Final Confirmation</text>
  </g>
</svg>
